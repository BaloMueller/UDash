<div class="form-group">
	<label class="form-label">Location (for tomorrow weather):</label>
	<div class="form-group">
		<span>Latitude</span>
		<input type="text" id="latitude" name="latitude" class="form-input" placeholder="e.g. 39.69315" />
	</div>
	<div class="form-group">
		<span>Longitude</span>
		<input type="text" id="longitude" name="longitude" class="form-input" placeholder="e.g. 3.34979" />
	</div>
</div>

<div class="form-group">
	<label for="units" class="form-label">Temperature Units:</label>
	<select id="units" name="units" class="form-input">
		<option value="metric">Metric (C)</option>
		<option value="imperial">Imperial (F)</option>
		<option value="standard">Standard (K)</option>
	</select>
</div>

<div class="form-group">
	<label for="birthdaysIcsUrl" class="form-label">Birthdays ICS URL:</label>
	<input type="url" id="birthdaysIcsUrl" name="birthdaysIcsUrl" class="form-input"
		   placeholder="https://calendar.google.com/calendar/ical/.../basic.ics" />
</div>

<div class="form-group">
	<label for="birthdayLookaheadDays" class="form-label">Show birthdays within:</label>
	<select id="birthdayLookaheadDays" name="birthdayLookaheadDays" class="form-input">
		<option value="30">30 days</option>
		<option value="60">60 days</option>
		<option value="90">90 days</option>
		<option value="120">120 days</option>
	</select>
</div>

<script>
	const draftStorageKey = 'personal_dashboard_settings_draft';

	function loadDraftSettings() {
		try {
			return JSON.parse(localStorage.getItem(draftStorageKey) || '{}');
		} catch (error) {
			return {};
		}
	}

	function saveDraftSettings() {
		const draft = {
			latitude: document.getElementById('latitude').value,
			longitude: document.getElementById('longitude').value,
			units: document.getElementById('units').value,
			birthdaysIcsUrl: document.getElementById('birthdaysIcsUrl').value,
			birthdayLookaheadDays: document.getElementById('birthdayLookaheadDays').value,
		};
		localStorage.setItem(draftStorageKey, JSON.stringify(draft));
	}

	document.addEventListener('DOMContentLoaded', () => {
		const draftSettings = loadDraftSettings();

		document.getElementById('latitude').value = pluginSettings.latitude || draftSettings.latitude || '';
		document.getElementById('longitude').value = pluginSettings.longitude || draftSettings.longitude || '';
		document.getElementById('units').value = pluginSettings.units || draftSettings.units || 'metric';
		document.getElementById('birthdaysIcsUrl').value = pluginSettings.birthdaysIcsUrl || draftSettings.birthdaysIcsUrl || '';
		document.getElementById('birthdayLookaheadDays').value = pluginSettings.birthdayLookaheadDays || draftSettings.birthdayLookaheadDays || '60';

		for (const fieldId of ['latitude', 'longitude', 'units', 'birthdaysIcsUrl', 'birthdayLookaheadDays']) {
			document.getElementById(fieldId).addEventListener('input', saveDraftSettings);
			document.getElementById(fieldId).addEventListener('change', saveDraftSettings);
		}
	});

	window.pluginValidate = function () {
		const lat = document.getElementById('latitude').value.trim();
		const lng = document.getElementById('longitude').value.trim();

		if ((lat === '') !== (lng === '')) {
			showResponseModal('failure', 'Both latitude and longitude must be set together.');
			return false;
		}

		if (lat !== '' || lng !== '') {
			const latNum = Number(lat);
			const lngNum = Number(lng);
			if (!Number.isFinite(latNum) || !Number.isFinite(lngNum)) {
				showResponseModal('failure', 'Latitude/longitude must be valid numbers.');
				return false;
			}
			if (latNum < -90 || latNum > 90) {
				showResponseModal('failure', 'Latitude must be between -90 and 90.');
				return false;
			}
			if (lngNum < -180 || lngNum > 180) {
				showResponseModal('failure', 'Longitude must be between -180 and 180.');
				return false;
			}
		}

		return true;
	};
</script>
